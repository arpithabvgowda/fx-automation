name: FX Automation CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]
    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Install Playwright browsers (v1.50+ includes native dep management)
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 5. Run Playwright API tests
      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          # This maps the GitHub Secret to an environment variable the code can see
          ACCESS_KEY: ${{ secrets.ACCESS_KEY }}
          BASE_URL: https://api.exchangeratesapi.io/v1/

      # 6. Upload Playwright HTML report (v6 is the 2026 standard)
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # 7. Upload coverage report
      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/
